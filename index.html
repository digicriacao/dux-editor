<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUX Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-left">
      <h1>DUX Editor</h1>
      <p>Gerador de receitas para o portal DUX Human Health.</p>
    </div>

  </header>

  <div class="toolbar">
    <input type="text" id="save-name" class="toolbar-input" placeholder="Nome da receita (ex: Pudim de chia)">
    <select id="load-select"></select>
    <div class="toolbar-divider"></div>
    <button class="btn btn-success" id="btn-save">Salvar</button>
    <button class="btn btn-secondary" id="btn-new">Nova</button>
    <button class="btn btn-danger" id="btn-delete">Excluir</button>
    <div class="toolbar-divider"></div>
    <button class="btn btn-ghost" id="btn-export" title="Baixar todas as receitas em .json">⤓ Exportar</button>
    <button class="btn btn-ghost" id="btn-import" title="Restaurar receitas de um .json">⤴ Importar</button>
    <input type="file" id="file-import" accept=".json" style="display:none;">
  </div>

  <div class="grid">

    <div class="panel">
      <div class="panel-header"><div class="panel-title">Dados da receita</div></div>
      <div class="panel-body">

        <div class="info-box">
          <strong>Fonte Barlow</strong> via Google Fonts. <strong>Salvar/Carregar</strong> guarda no GitHub Gist — use <strong>Exportar</strong> para backup.
        </div>

        <div class="field">
          <div class="row3">
            <div>
              <label class="field-label">Dificuldade</label>
              <input type="text" id="f-difficulty" placeholder="ex: FÁCIL">
            </div>
            <div>
              <label class="field-label">Preparo</label>
              <input type="text" id="f-prep" placeholder="ex: 30 MIN">
            </div>
            <div>
              <label class="field-label">Rendimento</label>
              <input type="text" id="f-yield" placeholder="ex: 1 PORÇÃO">
            </div>
          </div>
        </div>

        <div class="field">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <label class="field-label" style="margin:0;">Ingredientes</label>
            <button class="btn-add" id="btn-add-ing">+ Adicionar</button>
          </div>
          <div id="ingredients-list"></div>
        </div>

        <div class="field">
          <label class="field-label">Modo de preparo</label>
          <div class="editor-toolbar">
            <button type="button" class="tb-btn" data-cmd="bold" title="Negrito (Ctrl+B)"><strong>B</strong></button>
            <div class="tb-sep"></div>
            <button type="button" class="tb-btn" id="btn-link" title="Inserir/editar link (Ctrl+K)">🔗</button>
            <button type="button" class="tb-btn" id="btn-unlink" title="Remover link">⛌</button>
            <div class="tb-hint">Use B para negrito • Ctrl+K para link</div>
          </div>
          <div class="editor" id="editor" contenteditable="true" data-placeholder="Escreva o modo de preparo aqui..."></div>
        </div>

      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="tabs">
          <button class="tab active" data-view="preview">Preview</button>
          <button class="tab" data-view="code">Código</button>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-secondary" id="btn-download">⤓ Baixar HTML</button>
          <button class="btn btn-primary" id="btn-copy">📋 Copiar HTML</button>
        </div>
      </div>
      <div class="preview-container" id="preview-pane"><iframe id="preview-frame"></iframe></div>
      <div class="code-container" id="code-pane" style="display:none;"></div>
    </div>

  </div>

  <p class="footer">CSS inline + Barlow do Google Fonts. &nbsp;·&nbsp; <a href="news.html" style="color:#64748b;">Gerador de News</a></p>
</div>

<!-- Modal de link -->
<div class="modal-backdrop" id="link-modal">
  <div class="modal">
    <h3 id="link-modal-title">Inserir link</h3>
    <div class="field">
      <label class="field-label">Texto exibido</label>
      <input type="text" id="link-text" placeholder="Ex.: clique aqui">
    </div>
    <div class="field" style="margin-bottom:0;">
      <label class="field-label">URL</label>
      <input type="text" id="link-url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="link-cancel">Cancelar</button>
      <button class="btn btn-primary" id="link-save">Aplicar</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
(function() {
  'use strict';

  let ingredients = [];
  const editor = $('#editor');

  // ====== INGREDIENTES ======
  function renderIngredients() {
    const list = $('#ingredients-list');
    list.innerHTML = '';
    ingredients.forEach((ing, i) => {
      const row = document.createElement('div');
      row.className = 'ingredient-row';
      row.innerHTML = `
        <input type="text" value="${escapeAttr(ing)}" data-idx="${i}">
        <button class="btn-icon" data-remove="${i}" ${ingredients.length === 1 ? 'disabled' : ''} title="Remover">×</button>
      `;
      list.appendChild(row);
    });
    list.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', (e) => {
        ingredients[+e.target.dataset.idx] = e.target.value;
        updateOutput();
      });
    });
    list.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        ingredients.splice(+e.currentTarget.dataset.remove, 1);
        renderIngredients();
        updateOutput();
      });
    });
  }

  $('#btn-add-ing').addEventListener('click', () => {
    ingredients.push('');
    renderIngredients();
    updateOutput();
    const inputs = $('#ingredients-list').querySelectorAll('input');
    inputs[inputs.length - 1].focus();
  });

  // ====== EDITOR ======
  RichEditor.init(editor, updateOutput);

  $$('.tb-btn[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', (e) => e.preventDefault());
    btn.addEventListener('click', () => {
      RichEditor.applyCmd(btn.dataset.cmd, editor, updateOutput);
      updateToolbarState();
    });
  });

  editor.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'b') {
      e.preventDefault();
      RichEditor.applyCmd('bold', editor, updateOutput);
      updateToolbarState();
    }
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault(); LinkModal.open(editor, updateOutput);
    }
  });

  editor.addEventListener('mouseup', updateToolbarState);
  editor.addEventListener('keyup', updateToolbarState);

  function updateToolbarState() {
    RichEditor.updateToolbarState($$('.tb-btn[data-cmd]'));
  }

  LinkModal.initModal();
  $('#btn-link').addEventListener('mousedown', (e) => e.preventDefault());
  $('#btn-link').addEventListener('click', () => LinkModal.open(editor, updateOutput));
  $('#btn-unlink').addEventListener('mousedown', (e) => e.preventDefault());
  $('#btn-unlink').addEventListener('click', () => LinkModal.unlink(editor, updateOutput));

  let currentHtml = '';
  function updateOutput() {
    currentHtml = generateHtml();
    const iframe = $('#preview-frame');
    iframe.onload = () => {
      try {
        const doc = iframe.contentDocument;
        if (!doc || !doc.body) return;
        const h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight) + 4;
        iframe.style.height = h + 'px';
      } catch (e) {}
    };
    iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{background:#e5e5e5;margin:0;padding:20px 0;}</style></head><body>${currentHtml}</body></html>`;
    $('#code-pane').textContent = currentHtml;
  }

  $$('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      $$('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.view === 'preview') { $('#preview-pane').style.display = ''; $('#code-pane').style.display = 'none'; }
      else { $('#preview-pane').style.display = 'none'; $('#code-pane').style.display = ''; }
    });
  });

  ['#f-difficulty', '#f-prep', '#f-yield'].forEach(s => {
    $(s).addEventListener('input', updateOutput);
  });

  $('#btn-copy').addEventListener('click', async () => {
    await copyText(currentHtml);
    showToast('HTML copiado!');
  });

  $('#btn-download').addEventListener('click', () => {
    const full = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Receita DUX</title><style>body { background: #e5e5e5; margin: 0; padding: 24px 0; min-height: 100vh; }</style></head><body>${currentHtml}</body></html>`;
    const name = $('#save-name').value.trim() || 'receita-dux';
    downloadFile(full, name.replace(/[^a-zA-Z0-9-_]/g, '_') + '.html');
    showToast('Arquivo baixado!');
  });

  function getDataForSave() {
    return {
      difficulty: $('#f-difficulty').value,
      prep: $('#f-prep').value,
      yield: $('#f-yield').value,
      ingredients: [...ingredients],
      preparation: editor.innerHTML
    };
  }

  function loadData(data) {
    $('#f-difficulty').value = data.difficulty || '';
    $('#f-prep').value       = data.prep || '';
    $('#f-yield').value      = data.yield || '';
    ingredients = Array.isArray(data.ingredients) ? [...data.ingredients] : [''];
    if (ingredients.length === 0) ingredients = [''];
    editor.innerHTML = data.preparation || '';
    renderIngredients();
    updateOutput();
  }

  function newData() {
    loadData({ difficulty: '', prep: '', yield: '', ingredients: [''], preparation: '' });
  }

  initSaveToolbar({
    tipo: 'receita',
    getDataFn: getDataForSave,
    loadDataFn: loadData,
    newDataFn: newData,
    fileNamePrefix: 'receitas-dux'
  });

  newData();
})();
